<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlayerForSky</title>
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/animations.css" />
</head>
<body class="is-startup">

  <!-- Dynamic colour background (GLOBAL) -->
  <div id="global-bg">
    <canvas id="bg-canvas" class="bg-canvas"></canvas>
    <div id="bg-blur"  class="bg-blur"></div>
  </div>

  <!-- Global Top Bar -->
  <div class="global-top-bar" id="global-top-bar">
    <button id="settings-btn" class="icon-btn" title="设置">
      <span class="hamburger"></span>
    </button>
    <button id="back-btn" class="icon-btn hidden-back-btn" title="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="32" height="32"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
  </div>

  <!-- Spotlight search (global overlay, outside 3D scene) -->
  <div id="search-overlay" class="search-overlay">
    <div class="search-container">
      <input id="search-input" type="text" placeholder="搜索专辑或歌手…" autocomplete="off" />
    </div>
  </div>

  <!-- 3D Camera Scene -->
  <div class="camera-rig">
    <div class="scene-3d">
      <div class="wall-plane">
        <!-- ════════════════════════════════════
             MAIN VIEW
        ════════════════════════════════════ -->
        <div id="main-view" class="view">

          <!-- Cover Flow Stage -->
          <div class="cover-flow-stage">
            <div id="cover-flow" class="cover-flow">
              <!-- Album cards injected by JS -->
            </div>
          </div>

          <!-- Album info below cover -->
          <div class="album-info is-startup-info">
            <div id="album-title-display"  class="album-title"></div>
            <div id="album-artist-display" class="album-artist"></div>
          </div>

        </div><!-- /main-view -->
      </div>

      <div class="table-plane-entrance" aria-hidden="true">
        <div class="table-plane">
          <div class="table-cd-machine">
            <div class="table-cd-body"></div>
            <div class="table-cd-well"></div>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- ════════════════════════════════════
       PLAYBACK VIEW
  ════════════════════════════════════ -->
  <div id="playback-view" class="view inactive">

    <!-- CD Machine -->
    <div class="cd-player-main" style="position:relative; z-index:10;">
      <div class="cd-machine" id="cd-machine-container">
        <!-- Body (fades in) -->
        <div class="cd-machine-body"></div>
        <!-- Disc Shadow (fades in or drops) -->
        <div class="cd-disc-shadow"></div>
        <!-- The disc (drops in) -->
        <div id="cd-disc" class="cd-disc">
          <div class="cd-label">
            <img id="cd-cover-img" src="" alt="" draggable="false" />
          </div>
        </div>
      </div>
    </div>

    <!-- Playback controls (hover below CD) -->
    <div class="playback-controls">
      <button id="prev-btn"       class="control-btn" title="上一首">
        <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48" style="transform: scaleX(-1);"><path d="M7.58 16.89l5.77-4.07c.56-.4.56-1.24 0-1.63L7.58 7.11C6.91 6.65 6 7.12 6 7.93v8.14c0 .81.91 1.28 1.58.82zM16 7v10c0 .55.45 1 1 1s1-.45 1-1V7c0-.55-.45-1-1-1s-1 .45-1 1z"></path></svg>
      </button> 
      <button id="play-pause-btn" class="control-btn play-pause" title="播放/暂停">
        <svg viewBox="0 0 24 24" fill="currentColor" width="52" height="52"><path d="M8 6.82v10.36c0 .79.87 1.27 1.54.84l8.14-5.18c.62-.39.62-1.29 0-1.69L9.54 5.98C8.87 5.55 8 6.03 8 6.82z"></path></svg>
      </button>
      <button id="next-btn"       class="control-btn" title="下一首">
        <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48"><path d="M7.58 16.89l5.77-4.07c.56-.4.56-1.24 0-1.63L7.58 7.11C6.91 6.65 6 7.12 6 7.93v8.14c0 .81.91 1.28 1.58.82zM16 7v10c0 .55.45 1 1 1s1-.45 1-1V7c0-.55-.45-1-1-1s-1 .45-1 1z"></path></svg>
      </button> 
    </div>

    <!-- Progress bar (slides up on bottom hover) -->
    <div id="progress-container" class="progress-container">
      <div class="track-info">
        <span id="current-track-name">—</span>
        <span id="current-time-display">0:00 / 0:00</span>
      </div>
      <div id="progress-bar-wrap" class="progress-bar-wrap">
        <div id="progress-bar" class="progress-bar">
          <!-- Track segments injected by JS -->
        </div>
        <div id="progress-indicator" class="progress-indicator hidden"></div>
        <div id="progress-tooltip"   class="progress-tooltip hidden">
          <div class="tooltip-track-name"></div>
          <div class="tooltip-time"></div>
        </div>
      </div>
    </div>

  </div><!-- /playback-view -->


  <!-- ════════════════════════════════════
       SHARED OVERLAYS
  ════════════════════════════════════ -->

  <!-- Settings backdrop -->
  <div id="settings-backdrop" class="settings-backdrop"></div>

  <!-- Settings panel -->
  <div id="settings-panel" class="settings-panel">
    <h3>设置</h3>
    <div class="setting-item">
      <label for="volume-slider">音量</label>
      <input id="volume-slider" type="range" min="0" max="100" value="80" />
    </div>
  </div>


  <script type="module" src="./js/main.js"></script>
</body>
</html>
